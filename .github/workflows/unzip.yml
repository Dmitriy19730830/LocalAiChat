name: Unzip Project

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List files
        run: ls -la

      - name: Unzip LocalAIChat.zip
        run: |
          if [ -f "LocalAIChat.zip" ]; then
            unzip -o LocalAIChat.zip -d .
            rm LocalAIChat.zip
          else
            echo "No zip file found"
            exit 1
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Extracted project from zip" || echo "No changes"
          git push
